version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: kisan-mitra-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-kisan_mitra_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kisan_mitra_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kisan_network

  cache:
    image: redis:7-alpine
    container_name: kisan-mitra-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kisan_network

  vector_db:
    image: chromadb/chroma:latest
    container_name: kisan-mitra-vector-db
    restart: always
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=True
    volumes:
      - chroma_data:/chroma/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kisan_network

  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/backend.Dockerfile
    container_name: kisan-mitra-backend
    restart: always
    environment:
      - APP_NAME=KisanMitraAI
      - APP_ENV=production
      - DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-kisan_mitra_db}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-kisan_mitra_db}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - REDIS_URL=redis://cache:6379/0
      - CHROMA_HOST=vector_db
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - backend_logs:/backend/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      vector_db:
        condition: service_healthy
    networks:
      - kisan_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost
    container_name: kisan-mitra-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost
    depends_on:
      - backend
    networks:
      - kisan_network

  proxy:
    image: nginx:1.25-alpine
    container_name: kisan-mitra-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_logs:/var/log/nginx/backend_logs
    depends_on:
      - backend
      - frontend
    networks:
      - kisan_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  backend_logs:
    driver: local

networks:
  kisan_network:
    driver: bridge
