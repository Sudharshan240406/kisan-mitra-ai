name: CI Quality Gate

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black mypy pytest pip-audit

      - name: Run Ruff Lint Check
        run: ruff check backend/

      - name: Run Black Code Formatting Check
        run: black --check backend/

      - name: Run Mypy Type Checks
        run: mypy backend/

      - name: Run Backend Tests
        run: |
          pytest backend/tests/

      - name: Run Dependency Security Audit
        run: |
          pip-audit --desc on -r backend/requirements.txt || echo "WARNING: Dependency audit found vulnerabilities."

  frontend-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Next.js Lint
        run: npm run lint

      - name: Verify Next.js Compilation (Production Build)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-image-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: deployment/docker/backend.Dockerfile
          push: false
          tags: kisan-mitra-backend:ci-check

      - name: Validate Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: deployment/docker/frontend.Dockerfile
          push: false
          tags: kisan-mitra-frontend:ci-check
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost
