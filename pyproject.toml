[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
  )/
)
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
target-version = "py312"
line-length = 88

# Check configurations
lint.select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "T20",  # flake8-print
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-usepath
    "ERA",  # eradicate (commented out code)
    "PL",   # pylint
    "RUF"   # Ruff-specific rules
]

lint.ignore = [
    "E501",    # Line too long (handled by Black)
    "PLR0913", # Too many arguments in function call (common in dependency injection)
    "B008",    # Do not perform function call Depends in argument defaults (standard FastAPI)
    "PLR2004", # Magic values in comparison (expected in unit tests)
    "ARG001",  # Unused function arguments (expected in mock or skeletal implementations)
    "ARG002",  # Unused method arguments (expected in overridden abstract signatures)
    "PLC0415", # Import should be at the top-level of a file (common to avoid circular dependencies)
    "B904",    # Within an except clause, raise exceptions with raise ... from (suppressed for simplicity)
    "UP042",   # Class EntityType inherits from both str and Enum (standard Pydantic pattern)
    "PLR0915", # Too many statements (expected in complex planners)
    "PTH",     # Use pathlib instead of os.path (os.path is perfectly fine)
    "RUF006",  # Store a reference to the return value of asyncio.create_task (not always required)
    "N818",    # Exception name should be named with an Error suffix (we use KisanMitraException base exceptions)
    "UP"       # PyUpgrade syntactic syntax rules (suppressed for backward compatibility)
]

lint.exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "build",
    "dist"
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = [
    '\.venv',
    'venv',
    'build',
    'dist'
]

[[tool.mypy.overrides]]
module = [
    "redis.*",
    "chromadb.*",
    "psycopg2.*",
    "langgraph.*",
    "langchain_core.*"
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true


[tool.pytest.ini_options]
pythonpath = ["backend"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

